<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Deep Link Shortener Pro</title>
    
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* --- Core Styles & Theme --- */
        :root {
            --bg-color: #0d0d1a;
            --card-bg: rgba(30, 30, 50, 0.5);
            --border-color: rgba(255, 255, 255, 0.15);
            --glow-color: rgba(120, 80, 255, 0.3);
            --primary-text: #f0f0f5;
            --secondary-text: #a0a0b0;
            --input-bg: rgba(0, 0, 0, 0.2);
            --gradient-start: #8e2de2;
            --gradient-end: #4a00e0;
            --radius: 20px;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 10%, rgba(120, 80, 255, 0.2) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(80, 200, 255, 0.15) 0%, transparent 50%);
            color: var(--primary-text);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- Main App Container --- */
        .app-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* --- Glassmorphism Card Style --- */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            padding: 25px;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            transform: scale(0.95);
            opacity: 0;
            animation: fadeInScale 0.5s ease-out forwards;
        }
        
        .card.result-card {
            display: none; /* Hidden by default */
        }
        
        @keyframes fadeInScale {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* --- Header --- */
        .card-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .card-header h1 {
            font-size: 1.8rem;
            font-weight: 500;
            background: linear-gradient(90deg, #c5a6ff, #99c3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-header p {
            font-size: 0.9rem;
            color: var(--secondary-text);
            margin-top: 5px;
        }

        /* --- Modern Floating Input Fields --- */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .input-field {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px 20px;
            font-size: 1rem;
            color: var(--primary-text);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .input-field::placeholder {
            color: transparent;
        }
        .input-label {
            position: absolute;
            left: 20px;
            top: 15px;
            color: var(--secondary-text);
            pointer-events: none;
            transition: all 0.2s ease;
        }
        .input-field:focus,
        .input-field:not(:placeholder-shown) {
            outline: none;
            border-color: var(--gradient-start);
            box-shadow: 0 0 0 3px var(--glow-color);
        }
        .input-field:focus + .input-label,
        .input-field:not(:placeholder-shown) + .input-label {
            top: -10px;
            left: 15px;
            font-size: 0.75rem;
            padding: 0 5px;
            background: #1e1e32;
            color: var(--gradient-start);
        }

        /* --- Advanced Options --- */
        .advanced-toggle {
            color: var(--secondary-text);
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 20px;
            user-select: none;
        }
        .advanced-toggle i {
            transition: transform 0.3s ease;
        }
        .advanced-options {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
        }
        .advanced-options.show {
            max-height: 500px;
        }

        /* --- Button --- */
        .btn {
            position: relative;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background-image: linear-gradient(45deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
            user-select: none;
        }
        .btn:hover {
            box-shadow: 0 5px 15px var(--glow-color);
        }
        .btn:active {
            transform: scale(0.97);
        }

        /* Ripple effect for buttons */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            background-color: rgba(255, 255, 255, 0.7);
        }
        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* --- Result Card --- */
        .result-box {
            background: var(--input-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            text-align: center;
            word-wrap: break-word;
        }
        #short-link {
            font-size: 1.1rem;
            color: #aae2ff;
            font-weight: 500;
        }
        .result-actions {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        .action-btn {
            flex-grow: 1;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: var(--primary-text);
            font-size: 0.9rem;
        }

        /* --- QR Code --- */
        .qr-code-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 12px;
        }
        #qrcode canvas {
            max-width: 100%;
            height: auto;
        }

        /* --- Loader & Toasts --- */
        .loader {
            display: none;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-left-color: var(--gradient-start);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto 0;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: white;
            box-shadow: var(--shadow);
            transition: bottom 0.5s ease;
            z-index: 1000;
        }
        .toast.show {
            bottom: 30px;
        }
        .toast.success { background-color: #28a745; }
        .toast.error { background-color: #dc3545; }

    </style>
</head>
<body>

    <main class="app-container">
        <!-- Main Form Card -->
        <div class="card" id="form-card">
            <div class="card-header">
                <h1>Link Shortener Pro</h1>
                <p>Create smart, deep-linked URLs</p>
            </div>
            <form id="shorten-form">
                <div class="input-group">
                    <input type="url" id="default-url" class="input-field" placeholder="Default URL" required>
                    <label for="default-url" class="input-label">Default URL (e.g., https://...)</label>
                </div>

                <div class="advanced-toggle" id="advanced-toggle">
                    Advanced Options <i class="fas fa-chevron-down"></i>
                </div>

                <div class="advanced-options" id="advanced-options">
                    <div class="input-group">
                        <input type="text" id="android-url" class="input-field" placeholder="Android Intent URL">
                        <label for="android-url" class="input-label">Android Intent URL (Optional)</label>
                    </div>
                    <div class="input-group">
                        <input type="text" id="ios-url" class="input-field" placeholder="iOS URL Scheme">
                        <label for="ios-url" class="input-label">iOS URL Scheme (Optional)</label>
                    </div>
                    <div class="input-group">
                        <input type="text" id="custom-alias" class="input-field" placeholder="Custom Alias">
                        <label for="custom-alias" class="input-label">Custom Alias (Optional)</label>
                    </div>
                     <div class="input-group">
                        <select id="expiry-time" class="input-field">
                            <option value="">Never Expire</option>
                            <option value="5m">5 Minutes</option>
                            <option value="1h">1 Hour</option>
                            <option value="1d">1 Day</option>
                            <option value="7d">7 Days</option>
                            <option value="30d">30 Days</option>
                        </select>
                         <label for="expiry-time" class="input-label" style="top: -10px; left: 15px; font-size: 0.75rem; padding: 0 5px; background: #1e1e32;">Link Expiry</label>
                    </div>
                </div>

                <button type="submit" class="btn" id="submit-btn">
                    <span class="btn-text">Shorten Link</span>
                </button>
                <div class="loader" id="loader"></div>
            </form>
        </div>

        <!-- Result Card -->
        <div class="card result-card" id="result-card">
            <div class="card-header">
                <h1>Link Created!</h1>
            </div>
            <div class="result-box">
                <span id="short-link"></span>
            </div>
            <div class="result-actions">
                <button class="btn action-btn" id="copy-btn"><i class="fas fa-copy"></i> Copy</button>
                <button class="btn action-btn" id="share-btn"><i class="fas fa-share-alt"></i> Share</button>
            </div>
            <div class="qr-code-container">
                <div id="qrcode"></div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

        // --- Functions ---
        
        async function handleFormSubmit(e) {
            e.preventDefault();
            
            const defaultUrl = document.getElementById('default-url').value.trim();
            if (!defaultUrl) {
                showToast('Please enter a default URL.', 'error');
                return;
            }

            setLoading(true);
            
            const payload = {
                defaultUrl: defaultUrl,
                androidUrl: document.getElementById('android-url').value.trim(),
                iosUrl: document.getElementById('ios-url').value.trim(),
                customAlias: document.getElementById('custom-alias').value.trim(),
                expiry: document.getElementById('expiry-time').value
            };

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Required by Apps Script for POST
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`Network response was not ok: ${response.statusText}`);
                }

                const result = await response.json();

                if (result.status === 'success') {
                    displayResult(result.shortLink);
                    showToast('Link shortened successfully!', 'success');
                } else {
                    throw new Error(result.message || 'An unknown error occurred.');
                }

            } catch (error) {
                console.error('Error:', error);
                showToast(error.message, 'error');
            } finally {
                setLoading(false);
            }
        }

        function displayResult(link) {
            shortLinkEl.textContent = link;
            resultCard.style.display = 'block';
            resultCard.style.animation = 'fadeInScale 0.5s ease-out forwards';
            
            // Generate QR Code
            qrcodeContainer.innerHTML = '';
            qrcode = new QRCode(qrcodeContainer, {
                text: link,
                width: 150,
                height: 150,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function copyToClipboard() {
            const link = shortLinkEl.textContent;
            navigator.clipboard.writeText(link).then(() => {
                showToast('Copied to clipboard!', 'success');
            }).catch(err => {
                showToast('Failed to copy.', 'error');
            });
        }
        
        function shareLink() {
            const link = shortLinkEl.textContent;
            if (navigator.share) {
                navigator.share({
                    title: 'Smart Link',
                    text: 'Check out this link:',
                    url: link,
                }).catch(err => console.error('Share failed:', err));
            } else {
                showToast('Web Share API not supported.', 'error');
            }
        }

        function toggleAdvancedOptions() {
            const icon = advancedToggle.querySelector('i');
            advancedOptions.classList.toggle('show');
            icon.style.transform = advancedOptions.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                btnText.style.display = 'none';
                loader.style.display = 'block';
            } else {
                submitBtn.disabled = false;
                btnText.style.display = 'inline';
                loader.style.display = 'none';
            }
        }

        let toastTimeout;
        function showToast(message, type = 'success') {
            clearTimeout(toastTimeout);
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function createRipple(event) {
            const button = event.currentTarget;
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;

            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - button.offsetLeft - radius}px`;
            circle.style.top = `${event.clientY - button.offsetTop - radius}px`;
            circle.classList.add("ripple");

            const ripple = button.getElementsByClassName("ripple")[0];
            if (ripple) {
                ripple.remove();
            }

            button.appendChild(circle);
        }
    });
    </script>
</body>
</html>
